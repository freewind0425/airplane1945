<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Project K v1.0.9</title>
<style>

.left{position:absolute;top:78px;left:9px;width:116px;background:rgba(3,8,20,.68);border:1px solid rgba(120,180,255,.2);border-radius:14px;padding:9px;font-size:11px;font-weight:900}.bar{height:10px;background:#172033;border-radius:9px;margin:4px 0 9px;overflow:hidden}.bar i{display:block;height:100%;background:#38bdf8}.hp i{background:#ef4444}
.weapons{position:absolute;top:78px;right:9px;width:158px;background:rgba(3,8,20,.68);border:1px solid rgba(120,180,255,.2);border-radius:14px;padding:10px;font-size:11px;line-height:1.55;color:#dbeafe;font-weight:900}
.level{pointer-events:auto;position:absolute;left:12px;bottom:18px;width:72px;height:72px;border:2px solid #f6d35c;background:radial-gradient(circle,#7c2d12,#111827 70%);clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);color:#fff;font-weight:1000;display:none;align-items:center;justify-content:center;flex-direction:column;font-size:10px}.level b{font-size:24px}
.speed{pointer-events:auto;position:absolute;right:16px;bottom:18px;width:68px;height:68px;border-radius:50%;border:2px solid #38bdf8;background:#0b1830;color:white;font-weight:1000}.msg{position:absolute;left:50%;top:24%;transform:translate(-50%,-50%);font-size:34px;font-weight:1000;color:#f6d35c;text-shadow:0 0 18px rgba(246,211,92,.85);display:none;text-align:center}
.bossBar{position:absolute;top:62px;left:8%;right:8%;height:18px;background:rgba(60,0,0,.75);border:1px solid rgba(255,120,120,.55);border-radius:999px;overflow:hidden;display:none}.bossFill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);width:100%}
.modal{position:absolute;inset:0;background:rgba(0,0,0,.58);display:none;align-items:center;justify-content:center;z-index:30}.cards{display:flex;gap:10px}.card{width:29vw;max-width:170px;min-height:210px;border:1px solid #38bdf8;background:linear-gradient(#10234a,#071127);border-radius:20px;padding:14px;text-align:center}.card h3{font-size:15px}.card p{font-size:12px;color:#cfe4ff}.gold{border-color:#f6d35c!important}
.menu{width:min(86vw,420px);background:linear-gradient(#10234a,#071127);border:1px solid rgba(120,180,255,.35);border-radius:24px;padding:20px;text-align:center}.menuBtn{width:100%;height:52px;margin-top:10px;border:0;border-radius:16px;background:#18345c;color:white;font-weight:1000}.settle{background:linear-gradient(135deg,#f59e0b,#b91c1c)}
</style></head><body><div id="app">
<section id="lobby" class="screen active"><div class="grid"></div><div class="top"><div class="res" id="goldTop">GOLD 0</div><div class="res" id="rpTop">RP 0</div><div class="res">⚙</div></div><div class="title">PROJECT K</div><div class="sub">GO AIR RAID / WINGMAN BUILD v1.0.9</div><div class="showcase"><div class="platform"></div><div id="lobbyShip" class="ship"></div><div class="shipName">PK-A01 FALCON<div class="role">Balance Assault / Straight Cannon</div></div></div><div class="nav"><button>연구소</button><button onclick="toggleShip()">기체</button><button id="startBtn" class="start">출격</button><button>도감</button></div></section>
<section id="game" class="screen"><canvas id="gameCanvas"></canvas><div class="hud"><div class="topHud"><div class="stage" id="stageText">STAGE 1</div><div><div class="kill" id="killText">KILL 0/25</div><div class="progress"><div class="fill" id="stageFill"></div></div></div><button class="pause" id="pauseBtn">Ⅱ</button></div><div class="bossBar" id="bossBar"><div class="bossFill" id="bossFill"></div></div><div class="left">HP<div class="bar hp"><i id="hpFill" style="width:100%"></i></div>EXP<div class="bar"><i id="expFill" style="width:0%"></i></div></div><div class="weapons" id="weaponText"></div><button class="level" id="levelBtn"><span>LEVEL</span><b id="levelCount">1</b></button><button class="speed" id="speedBtn">⏩<br>x1</button><div class="msg" id="centerMsg"></div></div><div class="modal" id="levelModal"><div class="cards" id="cards"></div></div><div class="modal" id="pauseModal"><div class="menu"><h2>PAUSED</h2><button class="menuBtn" onclick="resumeGame()">계속하기</button><button class="menuBtn settle" onclick="settleAndLobby()">정산하고 로비로</button></div></div><div class="modal" id="resultModal"><div class="menu"><h2 id="resultTitle">RESULT</h2><div id="resultText" style="line-height:1.8;color:#cfe4ff"></div><button class="menuBtn settle" onclick="backToLobby()">로비로</button></div></div></section></div>
<script>
let selected='falcon', totalGold=0,totalRp=0; const lobbyShip=document.getElementById('lobbyShip');
function shipSvg(type='falcon',lv=5){const f=type==='falcon',main=f?'#f7f3e8':'#1f2937',acc=f?'#b91c1c':'#d97706',core=f?'#38bdf8':'#fb923c',wing=38+lv*11,body=54+lv*7;return `<svg width="512" height="512" viewBox="0 0 512 512"><ellipse cx="256" cy="385" rx="${82+lv*8}" ry="30" fill="#03101f" opacity=".55"/><path d="M256 54 L${256-body} 315 L256 426 L${256+body} 315 Z" fill="${main}" stroke="#111827" stroke-width="8"/><path d="M256 110 L${256-22-lv*2} 310 L256 360 L${256+22+lv*2} 310 Z" fill="${acc}"/><path d="M${256-body+8} 238 L${256-wing-92} 313 L${256-body+18} 334 Z" fill="${acc}" stroke="#111827" stroke-width="5"/><path d="M${256+body-8} 238 L${256+wing+92} 313 L${256+body-18} 334 Z" fill="${acc}" stroke="#111827" stroke-width="5"/><circle cx="256" cy="255" r="${16+lv*3}" fill="${core}"/><path d="M224 418 Q256 472 288 418" fill="${core}" opacity=".78"/></svg>`}
lobbyShip.innerHTML=shipSvg(); function toggleShip(){selected=selected==='falcon'?'vulcan':'falcon';lobbyShip.innerHTML=shipSvg(selected,5);document.querySelector('.shipName').innerHTML=selected==='falcon'?'PK-A01 FALCON<div class="role">Balance Assault / Straight Cannon</div>':'PK-B01 VULCAN<div class="role">Heavy Assault / Scatter Cannon</div>'}
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');let W=0,H=0,running=false,paused=false,last=0,speed=1,slow=1,player,bullets=[],enemyBullets=[],enemies=[],particles=[],boss=null,stage=1,kills=0,killGoal=25,exp=0,expNeed=50,levelPoints=0,runGold=0,runRp=0,weapons={straight:1,laser:0,chain:0,shield:0,wingS:0,wingH:0};
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}addEventListener('resize',resize);
document.getElementById('startBtn').onclick=()=>{lobby.classList.remove('active');game.classList.add('active');setTimeout(()=>{resize();startGame()},60)}; pauseBtn.onclick=()=>openPause(); speedBtn.onclick=()=>{speed=speed>=5?1:speed+1;speedBtn.innerHTML='⏩<br>x'+speed}; levelBtn.onclick=openLevel;
function startGame(){running=true;paused=false;last=performance.now();player={x:W/2,y:H-96,hp:100,maxHp:100,lv:1,fire:0,wingFire:0,homingFire:0};bullets=[];enemyBullets=[];enemies=[];particles=[];boss=null;stage=1;kills=0;killGoal=25;exp=0;expNeed=50;levelPoints=0;runGold=0;runRp=0;weapons={straight:1,laser:0,chain:0,shield:0,wingS:0,wingH:0};message('LAUNCH');requestAnimationFrame(loop)}
let drag=false;canvas.addEventListener('pointerdown',e=>{drag=true;move(e)});canvas.addEventListener('pointermove',e=>{if(drag)move(e)});addEventListener('pointerup',()=>drag=false);function move(e){if(!player)return;let r=canvas.getBoundingClientRect();player.x=e.clientX-r.left;player.y=e.clientY-r.top-35}
function loop(t){if(!running)return;let dt=Math.min((t-last)/1000,.033);last=t;if(!paused){update(dt*speed*slow);render()}requestAnimationFrame(loop)}
function update(dt){player.fire-=dt;player.wingFire-=dt;player.homingFire-=dt;if(player.fire<=0){fire();player.fire=.15}if(weapons.wingS>0&&player.wingFire<=0){fireWingS();player.wingFire=Math.max(.22,.72-weapons.wingS*.08)}if(weapons.wingH>0&&player.homingFire<=0){fireWingH();player.homingFire=Math.max(.35,1.05-weapons.wingH*.1)}if(!boss&&Math.random()<dt*(1.25+stage*.08))spawnEnemy();enemies.forEach(e=>{e.y+=e.v*dt;if(e.shoot){e.cool-=dt;if(e.cool<=0){e.cool=1.25;enemyBullets.push({x:e.x,y:e.y,vx:0,vy:165,life:3})}}});if(boss){boss.cool-=dt;if(boss.cool<=0){boss.cool=.65;for(let i=-2;i<=2;i++)enemyBullets.push({x:boss.x,y:boss.y+52,vx:i*55,vy:180,life:3})}}bullets.forEach(b=>{if(b.type==='homing'){let target=getNearest(b.x,b.y);if(target){let dx=target.x-b.x,dy=target.y-b.y,len=Math.hypot(dx,dy)||1;b.vx+=(dx/len)*420*dt;b.vy+=(dy/len)*420*dt;let sp=Math.hypot(b.vx,b.vy)||1;b.vx=b.vx/sp*360;b.vy=b.vy/sp*360}}b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt});enemyBullets.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt});particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt});bullets=bullets.filter(b=>b.life>0&&b.y>-100&&b.y<H+100&&b.x>-80&&b.x<W+80);enemyBullets=enemyBullets.filter(p=>p.life>0&&p.y<H+120);particles=particles.filter(p=>p.life>0&&p.y<H+120);collide();enemies=enemies.filter(e=>e.hp>0&&e.y<H+90);if(player.hp<=0)endRun('GAME OVER');updateUI()}
function getNearest(x,y){let arr=enemies.slice();if(boss)arr.push(boss);let best=null,bd=999999;arr.forEach(e=>{let d=Math.hypot(e.x-x,e.y-y);if(d<bd){bd=d;best=e}});return best}
function fire(){let lv=weapons.straight,arr=[0,-8,8,-15,15,-28,28].slice(0,lv===1?1:lv===2?2:lv===3?4:lv===4?5:7);arr.forEach(a=>{let r=a*Math.PI/180;bullets.push({x:player.x,y:player.y-36,vx:Math.sin(r)*280,vy:-540*Math.cos(r),dmg:11+stage,life:2,type:'straight'})});if(weapons.laser>0)bullets.push({x:player.x,y:player.y-245,vx:0,vy:0,dmg:2+weapons.laser,life:.12,type:'laser',w:12+weapons.laser*4,h:430})}
function fireWingS(){(weapons.wingS>=2?[[-58,24],[58,24]]:[[-58,24]]).forEach(p=>{bullets.push({x:player.x+p[0],y:player.y+p[1]-40,vx:0,vy:-440,dmg:7+weapons.wingS*3,life:2,type:'wing'});if(weapons.wingS>=5)bullets.push({x:player.x+p[0]+8,y:player.y+p[1]-42,vx:0,vy:-440,dmg:7+weapons.wingS*3,life:2,type:'wing'})})}
function fireWingH(){(weapons.wingH>=2?[[-72,42],[72,42]]:[[72,42]]).forEach(p=>bullets.push({x:player.x+p[0],y:player.y+p[1]-40,vx:0,vy:-360,dmg:8+weapons.wingH*3,life:3,type:'homing'}))}
function spawnEnemy(){let types=['normal','normal','fast','bomber'],type=types[Math.floor(Math.random()*types.length)],hp=type==='bomber'?48+stage*5:type==='fast'?12+stage*2:22+stage*3;enemies.push({x:30+Math.random()*(W-60),y:-42,hp,maxHp:hp,v:type==='fast'?165:type==='bomber'?48:86,type,shoot:type==='bomber',cool:1})}
function spawnBoss(){boss={x:W/2,y:106,hp:780+stage*190,maxHp:780+stage*190,cool:.5};message('WARNING<br>BOSS')}
function message(t){centerMsg.innerHTML=t;centerMsg.style.display='block';setTimeout(()=>centerMsg.style.display='none',1100)}
function collide(){for(let b of bullets){if(b.type==='laser'){enemies.forEach(e=>{if(Math.abs(e.x-b.x)<b.w+22&&e.y<b.y+b.h/2&&e.y>b.y-b.h/2)e.hp-=b.dmg});if(boss&&Math.abs(boss.x-b.x)<85)boss.hp-=b.dmg;continue}enemies.forEach(e=>{if(Math.hypot(e.x-b.x,e.y-b.y)<24){e.hp-=b.dmg;b.life=0;if(weapons.chain>0)enemies.forEach(o=>{if(o!==e&&Math.hypot(o.x-e.x,o.y-e.y)<105+weapons.chain*18)o.hp-=6+weapons.chain*3})}});if(boss&&Math.hypot(boss.x-b.x,boss.y-b.y)<88){boss.hp-=b.dmg;b.life=0}}enemies.forEach(e=>{if(e.hp<=0&&!e.dead){e.dead=true;kills++;exp+=9;runGold+=2;particles.push({x:e.x,y:e.y,vx:0,vy:-45,life:.8,type:'gold',txt:'+2G'});if(kills>=killGoal&&!boss){if(stage%5===0)spawnBoss();else nextStage()}}});if(boss&&boss.hp<=0){runGold+=50;runRp+=5;boss=null;message('BOSS CLEAR');nextStage()}enemyBullets.forEach(p=>{if(Math.hypot(p.x-player.x,p.y-player.y)<19){let dmg=weapons.shield>0?Math.max(2,10-weapons.shield*2):10;player.hp-=dmg;p.life=0}});while(exp>=expNeed){exp-=expNeed;expNeed=Math.floor(expNeed*1.35+22);levelPoints++;levelBtn.style.display='flex';levelCount.textContent=levelPoints}}
function nextStage(){stage++;kills=0;killGoal=20+stage*5;message('STAGE '+stage);if(stage%5===0)setTimeout(spawnBoss,800)}
function openLevel(){if(levelPoints<=0)return;slow=.2;levelModal.style.display='flex';let opts=[['Straight +1','정면 화력 증가','straight'],['Laser +1','관통 레이저','laser'],['Chain +1','연쇄 피해','chain'],['Shield +1','보호막','shield'],['Wingman S +1','정면 미사일 보조기','wingS'],['Wingman H +1','유도 미사일 보조기','wingH']].sort(()=>Math.random()-.5).slice(0,3);cards.innerHTML=opts.map((o,i)=>`<div class="card ${i==0?'gold':''}" onclick="choose('${o[2]}')"><h3>${o[0]}</h3><p>${o[1]}</p></div>`).join('')}
function choose(w){weapons[w]=Math.min(5,(weapons[w]||0)+1);if(w==='straight')player.lv=Math.min(5,weapons[w]);levelPoints--;levelModal.style.display='none';slow=1;if(levelPoints<=0)levelBtn.style.display='none';levelCount.textContent=levelPoints;updateUI()}window.choose=choose;
function openPause(){if(!running)return;paused=true;pauseModal.style.display='flex'}function resumeGame(){paused=false;pauseModal.style.display='none'}function settleAndLobby(){pauseModal.style.display='none';endRun('정산')}function endRun(title){if(!running)return;running=false;paused=true;totalGold+=runGold;totalRp+=runRp;resultTitle.textContent=title;resultText.innerHTML=`Stage ${stage}<br>Gold +${runGold}<br>RP +${runRp}`;resultModal.style.display='flex';updateLobby()}function backToLobby(){resultModal.style.display='none';game.classList.remove('active');lobby.classList.add('active');paused=false;running=false}function updateLobby(){goldTop.textContent='GOLD '+totalGold;rpTop.textContent='RP '+totalRp}
function drawShip(x,y,lv,type){ctx.save();ctx.translate(x,y);ctx.scale(.30+.025*lv,.30+.025*lv);ctx.translate(-256,-256);ctx.fillStyle=type==='falcon'?'#f7f3e8':'#1f2937';ctx.strokeStyle='#111827';ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(256,54);ctx.lineTo(188-lv*6,315);ctx.lineTo(256,426);ctx.lineTo(324+lv*6,315);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=type==='falcon'?'#b91c1c':'#d97706';ctx.beginPath();ctx.moveTo(198,238);ctx.lineTo(95-lv*12,313);ctx.lineTo(210,334);ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(314,238);ctx.lineTo(417+lv*12,313);ctx.lineTo(302,334);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=type==='falcon'?'#38bdf8':'#fb923c';ctx.beginPath();ctx.arc(256,255,19+lv*3,0,7);ctx.fill();ctx.restore()}
function drawWingman(x,y,type){ctx.save();ctx.translate(x,y);ctx.scale(.38,.38);ctx.fillStyle=type==='h'?'#38bdf8':'#f6d35c';ctx.strokeStyle='#0f172a';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(-18,24);ctx.lineTo(0,14);ctx.lineTo(18,24);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}
function render(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#071127';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(56,189,248,.075)';for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y+(performance.now()/42%40));ctx.lineTo(W,y+(performance.now()/42%40));ctx.stroke()}bullets.forEach(b=>{if(b.type==='laser'){ctx.fillStyle='rgba(56,189,248,.24)';ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillRect(b.x-2,b.y-b.h/2,4,b.h)}else{ctx.fillStyle=b.type==='homing'?'#38bdf8':b.type==='wing'?'#f6d35c':'#fde68a';ctx.beginPath();ctx.arc(b.x,b.y,b.type==='homing'?5:4,0,7);ctx.fill()}});enemies.forEach(e=>{ctx.save();ctx.translate(e.x,e.y);ctx.fillStyle=e.type==='bomber'?'#7f1d1d':e.type==='fast'?'#fb923c':'#ef4444';ctx.beginPath();ctx.moveTo(0,23);ctx.lineTo(-19,-19);ctx.lineTo(19,-19);ctx.closePath();ctx.fill();ctx.restore()});if(boss){ctx.fillStyle='#991b1b';ctx.fillRect(boss.x-86,boss.y-48,172,96);ctx.fillStyle='#f6d35c';ctx.fillRect(30,62,(W-60)*(boss.hp/boss.maxHp),12);ctx.strokeStyle='#fff';ctx.strokeRect(30,62,W-60,12)}enemyBullets.forEach(p=>{ctx.fillStyle='#fb923c';ctx.beginPath();ctx.arc(p.x,p.y,6,0,7);ctx.fill()});particles.forEach(p=>{if(p.type==='gold'){ctx.fillStyle='#f6d35c';ctx.font='bold 14px Arial';ctx.fillText(p.txt,p.x,p.y)}});if(weapons.wingS>0)(weapons.wingS>=2?[[-58,24],[58,24]]:[[-58,24]]).forEach(p=>drawWingman(player.x+p[0],player.y+p[1],'s'));if(weapons.wingH>0)(weapons.wingH>=2?[[-72,42],[72,42]]:[[72,42]]).forEach(p=>drawWingman(player.x+p[0],player.y+p[1],'h'));drawShip(player.x,player.y,player.lv,selected);if(weapons.shield>0){ctx.strokeStyle='rgba(56,189,248,.55)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(player.x,player.y,45+weapons.shield*8,0,7);ctx.stroke()}}
function updateUI(){stageText.textContent='STAGE '+stage+(boss?' / BOSS':'');killText.textContent=boss?'BOSS HP':'KILL '+Math.min(kills,killGoal)+'/'+killGoal;stageFill.style.width=(Math.min(kills/killGoal,1)*100)+'%';hpFill.style.width=Math.max(player.hp/player.maxHp*100,0)+'%';expFill.style.width=Math.min(exp/expNeed*100,100)+'%';weaponText.innerHTML=`Straight Lv${weapons.straight}<br>Laser Lv${weapons.laser}<br>Chain Lv${weapons.chain}<br>Shield Lv${weapons.shield}<br>Wing S Lv${weapons.wingS}<br>Wing H Lv${weapons.wingH}`;bossBar.style.display=boss?'block':'none';if(boss)bossFill.style.width=(boss.hp/boss.maxHp*100)+'%'}
</script></body></html>
