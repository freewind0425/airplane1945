<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>GO ARCADE - GO AIR RAID v0.4</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game-container">
    <div id="hud">
      <div class="hud-row">
        <div id="stage-info">STAGE 1</div>
        <div id="stage-progress-text">킬 진행도: 0 / 15</div>
      </div>
      <div class="bar-bg"><div id="progress-bar"></div></div>
      <div class="bar-bg"><div id="xp-bar"></div></div>
    </div>

    <div id="skill-status-panel">
      <div class="status-item"><span class="status-name">미사일</span><span class="status-lvl" id="st-m">Lv.1</span></div>
      <div class="status-item"><span class="status-name">레이저</span><span class="status-lvl" id="st-l">Lv.0</span></div>
      <div class="status-item"><span class="status-name">체인</span><span class="status-lvl" id="st-c">Lv.0</span></div>
      <div class="status-item"><span class="status-name">실드</span><span class="status-lvl" id="st-s">Lv.0</span></div>
      <div class="status-item"><span class="status-name">골드</span><span class="status-lvl" id="st-g">0</span></div>
    </div>

    <div id="hp-panel">HP <span id="hp-text">100</span></div>
    <div id="floating-note">드래그 이동 / 자동 발사 / 월드 2배</div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="modal" style="display:flex">
      <h1>GO AIR RAID</h1>
      <p>v0.4 GO ENGINE 구조 테스트<br>Sprite 기반 렌더링 / 2배 월드 / 카메라 추적</p>
      <button class="btn-action" id="btn-start">출격</button>
    </div>

    <div id="level-modal" class="modal">
      <div class="modal-title">전투 강화 선택</div>
      <div class="timer-notice" id="level-timer">자동 선택까지 5초</div>
      <div id="card-list" class="card-list"></div>
    </div>

    <div id="gameover-screen" class="modal">
      <div class="modal-title">기체 파손 정산</div>
      <div class="gold-display" id="total-gold">0 G</div>
      <div class="shop">
        <div class="shop-item">
          <div><span class="shop-name">공격력 강화</span><span class="shop-level" id="lvl-atk">Lv.1</span></div>
          <button class="btn-upgrade" id="btn-buy-atk">500 G</button>
        </div>
        <div class="shop-item">
          <div><span class="shop-name">최대 내구도</span><span class="shop-level" id="lvl-hp">Lv.1</span></div>
          <button class="btn-upgrade" id="btn-buy-hp">400 G</button>
        </div>
      </div>
      <button class="btn-action" id="btn-restart">즉시 재출격</button>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
