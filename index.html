<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GO ARCADE - 1945</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="crt"></div>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">MINI GAME PORTFOLIO</p>
      <h1>GO ARCADE</h1>
      <p class="subtitle">1945 스타일 2D 비행 슈팅 게임</p>
    </header>
    <section class="machine">
      <div class="screen-panel">
        <canvas id="game" width="420" height="640"></canvas>
        <div id="startPanel" class="overlay">
          <h2>1945 AIR RAID</h2>
          <p>적기를 격추하고 아이템을 먹어 기체를 강화하세요.</p>
          <div class="keys"><span>WASD / 방향키 이동</span><span>SPACE 발사</span><span>P 일시정지</span></div>
          <button id="startBtn">PRESS START</button>
        </div>
        <div id="gameOverPanel" class="overlay hidden">
          <h2>GAME OVER</h2><p id="finalScore">SCORE 0</p><button id="restartBtn">RESTART</button>
        </div>
      </div>
      <aside class="side-panel">
        <div class="score-box"><span>SCORE</span><strong id="score">0</strong></div>
        <div class="score-box"><span>BEST</span><strong id="best">0</strong></div>
        <div class="score-box"><span>LEVEL</span><strong id="level">1</strong></div>
        <div class="score-box"><span>HP</span><strong id="hp">3</strong></div>
        <div class="manual"><h3>UPGRADE</h3><p>파란 아이템: 발사 수 증가</p><p>노란 아이템: 공격 속도 증가</p><p>초록 아이템: HP 회복</p></div>
      </aside>
    </section>
    <section class="portfolio"><h2>COMING SOON</h2><div class="cards"><a class="card disabled">TETRIS</a><a class="card disabled">BRICK BREAKER</a><a class="card disabled">EQUIPMENT TETRIS</a></div></section>
  </main>
  <script src="game.js"></script>
</body>
</html>
