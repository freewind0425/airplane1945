<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Project K - GO AIR RAID</title><link rel="stylesheet" href="css/style.css"></head><body><div id="app">
<section id="lobby" class="screen active">
  <div class="topbar"><div class="brand">PROJECT K</div><div class="res"><div class="pill">PILOT Lv.<span id="pilotLv">1</span></div><div class="pill">G <span id="goldView">0</span></div><div class="pill">RP <span id="rpView">0</span></div></div></div>
  <button id="missionIcon" class="mission-icon has">☑</button>
  <div class="lobby-main">
    <div class="panel side"><h3>연구소</h3><div id="researchList" class="side-list"></div></div>
    <div class="panel aircraft-stage"><div class="ship-title" id="shipName">FALCON</div><img id="lobbyShip" class="ship-img"><div class="mini-card">기본 무기: <b id="baseWeapon">직선 캐논</b></div><button id="startBtn" class="start-btn">게임시작!!</button></div>
    <div class="panel side"><h3>기체 도감</h3><div id="aircraftList" class="side-list"></div></div>
  </div>
  <div class="bottom-nav"><button class="nav-btn">연구소</button><button class="nav-btn active">기체</button><button class="nav-btn">도감</button></div>
</section>
<section id="game" class="screen"><canvas id="gameCanvas"></canvas><div class="game-hud"><div class="game-top"><div><div class="stage" id="stageText">STAGE 1</div><div class="bar"><div id="hpFill" class="fill"></div></div><div class="bar"><div id="xpFill" class="fill" style="background:#7c5cff"></div></div></div><div class="gold">G <span id="runGold">0</span></div><button id="pauseBtn" class="pause">Ⅱ</button></div><div id="weaponPanel" class="weapon-panel"></div><div class="bottom-left"><button id="levelCore" class="level-core">LEVEL UP<b>0</b></button><button id="speedBtn" class="speed-btn">⏩<br>x1</button></div></div><div class="hint">드래그/마우스로 기체 이동</div></section>
<div id="levelModal" class="modal"><div class="modal-box"><button id="closeLevel" class="close">닫기</button><div class="modal-title">LEVEL UP CORE</div><div id="cardList" class="level-cards"></div></div></div>
<div id="missionModal" class="modal"><div class="modal-box"><button id="closeMission" class="close">닫기</button><div class="modal-title">일일 미션</div><div id="missionList"></div></div></div>
<div id="toast" class="toast"></div>
</div><script src="js/main.js"></script></body></html>
