<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>GO ARCADE - GO AIR RAID v0.2</title>
<style>
*{box-sizing:border-box;user-select:none;-webkit-user-select:none;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#02060c;color:#fff;font-family:Arial,"Noto Sans KR",sans-serif}
#game-container{position:relative;width:100%;height:100%;max-width:720px;margin:0 auto;background:#050b14;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none;background:#06101f}
#hud{position:absolute;top:0;left:0;width:100%;z-index:10;padding:16px 18px;background:linear-gradient(to bottom,rgba(5,11,20,.95),rgba(5,11,20,0))}
.hud-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#stage-info{font-size:22px;font-weight:900;letter-spacing:1px}
#stage-progress-text{font-size:13px;color:#8a9fc4;font-weight:bold}
.bar-bg{width:100%;height:9px;background:#111622;border:1px solid #1f293d;border-radius:99px;overflow:hidden;margin-bottom:7px}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff9f43,#ff4757)}
#xp-bar{height:100%;width:0%;background:#00ffcc;box-shadow:0 0 10px #00ffcc}
#skill-status-panel{position:absolute;top:92px;right:12px;z-index:9;background:rgba(11,22,42,.78);border:1px solid #1f293d;border-radius:10px;padding:10px 12px;font-size:12px;display:grid;gap:5px;pointer-events:none}
.status-item{display:flex;justify-content:space-between;gap:12px}.status-name{color:#8a9fc4}.status-lvl{color:#00ffcc;font-weight:900}
#hp-panel{position:absolute;left:16px;bottom:18px;z-index:9;background:rgba(11,22,42,.78);border:1px solid #1f293d;border-radius:12px;padding:10px 12px;font-size:14px;font-weight:900}
.modal{display:none;position:absolute;inset:0;z-index:20;background:rgba(3,8,16,.92);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);flex-direction:column;justify-content:center;align-items:center;padding:24px}
.modal-title{font-size:26px;font-weight:900;color:#00ffcc;text-align:center;margin-bottom:8px}
.timer-notice{font-size:14px;color:#ff9f43;margin-bottom:22px;font-weight:900}
.card{width:100%;max-width:430px;background:#0f1b30;border:2px solid #233554;border-radius:14px;margin-bottom:13px;padding:18px;cursor:pointer}
.card:active,.card:hover{border-color:#00ffcc;transform:translateY(-2px)}
.card-title{font-size:18px;font-weight:900;color:#00ffcc;margin-bottom:6px}
.card-desc{font-size:14px;color:#cbd5e1;line-height:1.45}
.btn-action{width:260px;height:54px;background:#00ffcc;color:#02060c;border:0;border-radius:10px;font-size:17px;font-weight:900;box-shadow:0 0 18px rgba(0,255,204,.35)}
#start-screen h1{font-size:44px;color:#ffdf3d;text-shadow:0 0 15px #ff7a00;margin-bottom:10px}
#start-screen p{color:#cbd5e1;text-align:center;line-height:1.5;margin-bottom:18px}
#gameover-screen .modal-title{color:#ff4757}
.gold-display{font-size:30px;font-weight:900;color:#ffd32a;margin-bottom:16px;text-align:center}
.shop{width:100%;max-width:430px;margin-bottom:24px}
.shop-item{display:flex;justify-content:space-between;align-items:center;background:#0f1b30;padding:14px 16px;border-radius:10px;margin-bottom:10px;border:1px solid #1f293d}
.shop-name{font-size:14px;font-weight:900}.shop-level{font-size:12px;color:#8a9fc4;margin-top:4px;display:block}
.btn-upgrade{background:#ffd32a;color:#02060c;border:0;padding:8px 14px;font-weight:900;border-radius:7px}
.btn-upgrade:disabled{background:#4b5563;color:#9ca3af}
#floating-note{position:absolute;bottom:18px;right:14px;z-index:9;color:#8a9fc4;font-size:12px;background:rgba(0,0,0,.25);padding:8px 10px;border-radius:99px}
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <div class="hud-row">
      <div id="stage-info">STAGE 1</div>
      <div id="stage-progress-text">킬 진행도: 0 / 15</div>
    </div>
    <div class="bar-bg"><div id="progress-bar"></div></div>
    <div class="bar-bg"><div id="xp-bar"></div></div>
  </div>

  <div id="skill-status-panel">
    <div class="status-item"><span class="status-name">기본미사일</span><span class="status-lvl" id="st-m">Lv.1</span></div>
    <div class="status-item"><span class="status-name">레이저빔</span><span class="status-lvl" id="st-l">Lv.0</span></div>
    <div class="status-item"><span class="status-name">체인</span><span class="status-lvl" id="st-c">Lv.0</span></div>
    <div class="status-item"><span class="status-name">실드</span><span class="status-lvl" id="st-s">Lv.0</span></div>
  </div>

  <div id="hp-panel">HP <span id="hp-text">100</span></div>
  <div id="floating-note">드래그 이동 / 자동 발사</div>

  <canvas id="gameCanvas"></canvas>

  <div id="start-screen" class="modal" style="display:flex">
    <h1>GO AIR RAID</h1>
    <p>1945 스타일 모바일 슈팅 테스트<br>드래그로 기체를 움직이고 자동 발사로 적을 격추하세요.</p>
    <button class="btn-action" onclick="startGame()">출격</button>
  </div>

  <div id="level-modal" class="modal">
    <div class="modal-title">전투 강화 선택</div>
    <div class="timer-notice" id="level-timer">자동 선택까지 5초</div>
    <div id="card-list" style="width:100%;display:flex;flex-direction:column;align-items:center"></div>
  </div>

  <div id="gameover-screen" class="modal">
    <div class="modal-title">기체 파손 정산</div>
    <div class="timer-notice" id="gameover-timer">자동 재출격까지 5초</div>
    <div class="gold-display" id="total-gold">0 G</div>
    <div class="shop">
      <div class="shop-item">
        <div><span class="shop-name">공격력 강화</span><span class="shop-level" id="lvl-atk">Lv.1</span></div>
        <button class="btn-upgrade" id="btn-buy-atk" onclick="buyMeta('atk')">500 G</button>
      </div>
      <div class="shop-item">
        <div><span class="shop-name">최대 내구도</span><span class="shop-level" id="lvl-hp">Lv.1</span></div>
        <button class="btn-upgrade" id="btn-buy-hp" onclick="buyMeta('hp')">400 G</button>
      </div>
    </div>
    <button class="btn-action" onclick="restartGame()">즉시 재출격</button>
  </div>
</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const container=document.getElementById('game-container');

const xpBar=document.getElementById('xp-bar');
const progressBar=document.getElementById('progress-bar');
const stageInfo=document.getElementById('stage-info');
const stageProgressText=document.getElementById('stage-progress-text');
const levelModal=document.getElementById('level-modal');
const cardList=document.getElementById('card-list');
const levelTimerView=document.getElementById('level-timer');
const gameoverScreen=document.getElementById('gameover-screen');
const gameoverTimerView=document.getElementById('gameover-timer');
const totalGoldDisplay=document.getElementById('total-gold');
const startScreen=document.getElementById('start-screen');
const hpText=document.getElementById('hp-text');

function resize(){
  canvas.width=container.clientWidth;
  canvas.height=container.clientHeight;
}
window.addEventListener('resize',resize);
resize();

let gameState='READY';
let stage=1, stageKills=0, killsRequired=15, goldEarned=0;
let modalTimer=null, modalSecondsLeft=5;
let meta={atkLevel:1,hpLevel:1,gold:Number(localStorage.getItem('go_airraid_gold')||1000)};
let bestStage=Number(localStorage.getItem('go_airraid_best_stage')||1);
let lastSpawn=0, spawnInterval=760;
let lastBossStage=0;

let player={
  x:canvas.width/2,y:canvas.height-160,targetX:canvas.width/2,targetY:canvas.height-160,
  width:58,height:60,hp:100,maxHp:100,xp:0,nextXp:100,baseAtk:15,atkSpeed:230,lastShot:0,inv:0
};

let skills={SK_M:1,SK_L:0,SK_C:0,SK_S:0,EV_M:0,EV_L:0};
let playerBullets=[],enemies=[],enemyBullets=[],particles=[],chainLightnings=[],stars=[];
let shieldAngle=0;

function makeStars(){
  stars=Array.from({length:90},()=>({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*2+0.5,v:Math.random()*1.5+0.5}));
}
makeStars();

function setTarget(clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  player.targetX=clientX-rect.left;
  player.targetY=clientY-rect.top-40; // 손가락에 가려지지 않도록 살짝 위로
}
canvas.addEventListener('mousemove',e=>setTarget(e.clientX,e.clientY));
canvas.addEventListener('touchstart',e=>{ if(e.touches.length>0){setTarget(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault();}}, {passive:false});
canvas.addEventListener('touchmove',e=>{ if(e.touches.length>0){setTarget(e.touches[0].clientX,e.touches[0].clientY); e.preventDefault();}}, {passive:false});

function initRun(){
  player.maxHp=100+(meta.hpLevel-1)*35;
  player.hp=player.maxHp;
  player.baseAtk=15+(meta.atkLevel-1)*5;
  player.x=canvas.width/2; player.y=canvas.height-160; player.targetX=player.x; player.targetY=player.y;
  player.xp=0; player.nextXp=100; player.lastShot=0; player.inv=0;
  stage=1; stageKills=0; killsRequired=15; goldEarned=0; spawnInterval=760; lastBossStage=0;
  skills={SK_M:1,SK_L:0,SK_C:0,SK_S:0,EV_M:0,EV_L:0};
  playerBullets=[]; enemies=[]; enemyBullets=[]; particles=[]; chainLightnings=[];
  makeStars();
  updateStatusPanel();
}

window.startGame=function(){
  startScreen.style.display='none';
  gameoverScreen.style.display='none';
  levelModal.style.display='none';
  initRun();
  gameState='PLAY';
}

function updateStatusPanel(){
  document.getElementById('st-m').innerText=skills.EV_M?'진화':`Lv.${skills.SK_M}`;
  document.getElementById('st-l').innerText=skills.EV_L?'진화':`Lv.${skills.SK_L}`;
  document.getElementById('st-c').innerText=`Lv.${skills.SK_C}`;
  document.getElementById('st-s').innerText=`Lv.${skills.SK_S}`;
  stageInfo.innerText=`STAGE ${stage}`;
  stageProgressText.innerText=`킬 진행도: ${stageKills} / ${killsRequired}`;
  progressBar.style.width=`${Math.min(100,(stageKills/killsRequired)*100)}%`;
  xpBar.style.width=`${Math.min(100,(player.xp/player.nextXp)*100)}%`;
  hpText.innerText=Math.max(0,Math.floor(player.hp));
}

function spawnEnemyUnit(now){
  if(gameState!=='PLAY')return;

  // 5스테이지마다 보스
  if(stage%5===0 && lastBossStage!==stage){
    lastBossStage=stage;
    enemies.push({
      id:Math.random().toString(), x:canvas.width/2, y:-120, vx:1.2, vy:1.0,
      width:140, height:110, hp:700+stage*160, maxHp:700+stage*160,
      type:'BOSS', pattern:'BOSS', lastShot:now, shotInterval:650, stopY:150
    });
    return;
  }

  let dice=Math.random();
  let isBomber=Math.random()>.78;
  let width=isBomber?74:48, height=isBomber?64:48;
  let startX,startY,vx,vy,patternType;

  if(dice<.42){
    startX=Math.random()*(canvas.width-width)+width/2; startY=-50;
    vx=(Math.random()-.5)*0.9; vy=1.7; patternType='ARTILLERY';
  }else if(dice<.70){
    let left=Math.random()>.5;
    startX=left?-60:canvas.width+60; startY=Math.random()*(canvas.height*.48)+110;
    vx=left?(Math.random()*1.5+1.5):-(Math.random()*1.5+1.5);
    vy=(Math.random()-.5)*0.55; patternType='CROSSING';
  }else{
    startX=Math.random()*(canvas.width-width)+width/2; startY=-50;
    vx=(Math.random()-.5)*1.2; vy=isBomber?1.25:2.55; patternType='ASSAULT';
  }

  enemies.push({
    id:Math.random().toString(),x:startX,y:startY,vx,vy,width,height,
    hp:isBomber?70+stage*28:24+stage*9,maxHp:isBomber?70+stage*28:24+stage*9,
    type:isBomber?'BOMBER':'SCOUT',pattern:patternType,lastShot:now,
    shotInterval:isBomber?1200:2000,stopY:Math.random()*220+135
  });
}

function fireWeapons(now){
  if(now-player.lastShot<player.atkSpeed)return;
  player.lastShot=now;

  if(skills.EV_M>0){
    playerBullets.push({x:player.x,y:player.y-34,type:'CLUSTER',damage:player.baseAtk*2.5,vx:0,vy:-8,r:12});
  }else{
    let count=skills.SK_M;
    for(let i=0;i<count;i++){
      let spreadX=(i-(count-1)/2)*18;
      playerBullets.push({x:player.x+spreadX,y:player.y-28,type:'MISSILE',damage:player.baseAtk,vx:spreadX*.045,vy:-8,r:6});
    }
  }

  if(skills.EV_L>0){
    playerBullets.push({x:player.x,y:player.y-44,type:'PRISM_LASER',damage:player.baseAtk*.85});
  }else if(skills.SK_L>0){
    playerBullets.push({x:player.x,y:player.y-34,type:'BASE_LASER',damage:player.baseAtk*(.7+skills.SK_L*.22)});
  }
}

function triggerLevelUp(){
  gameState='LEVEL_UP';
  levelModal.style.display='flex';
  cardList.innerHTML='';
  let pool=[];

  if(skills.SK_M===5 && skills.SK_C>=1 && skills.EV_M===0) pool.push({id:'EV_M',name:'★진화★ 클러스터 미사일',desc:'미사일이 폭발 후 분열탄으로 확산됩니다.'});
  if(skills.SK_L===5 && skills.SK_M>=1 && skills.EV_L===0) pool.push({id:'EV_L',name:'★진화★ 프리즘 레이저',desc:'광폭 관통 레이저와 연쇄 전격을 발동합니다.'});
  if(skills.SK_M<5 && skills.EV_M===0) pool.push({id:'SK_M',name:`유도 미사일 Lv.${skills.SK_M+1}`,desc:'기본 발사 수가 증가합니다. 기체 외형도 강화됩니다.'});
  if(skills.SK_L<5 && skills.EV_L===0) pool.push({id:'SK_L',name:`레이저 빔 Lv.${skills.SK_L+1}`,desc:'전방 관통 레이저를 추가합니다.'});
  if(skills.SK_C<5) pool.push({id:'SK_C',name:`과부하 체인 Lv.${skills.SK_C+1}`,desc:'처치 시 주변 적에게 전격이 전이됩니다.'});
  if(skills.SK_S<3) pool.push({id:'SK_S',name:`플라즈마 실드 Lv.${skills.SK_S+1}`,desc:'기체 주변 실드가 적 탄환을 제거합니다.'});
  pool.push({id:'HEAL',name:'긴급 내구도 수리',desc:'기체 내구도를 40% 회복합니다.'});

  let cards=pool.sort(()=>.5-Math.random()).slice(0,3);
  cards.forEach(c=>{
    let div=document.createElement('div');
    div.className='card';
    div.innerHTML=`<div class="card-title">${c.name}</div><div class="card-desc">${c.desc}</div>`;
    div.onclick=()=>selectSkill(c.id);
    cardList.appendChild(div);
  });

  modalSecondsLeft=5;
  levelTimerView.innerText=`자동 선택까지 ${modalSecondsLeft}초`;
  clearInterval(modalTimer);
  modalTimer=setInterval(()=>{
    modalSecondsLeft--;
    levelTimerView.innerText=`자동 선택까지 ${modalSecondsLeft}초`;
    if(modalSecondsLeft<=0){clearInterval(modalTimer);selectSkill(cards[0].id);}
  },1000);
}

function selectSkill(id){
  clearInterval(modalTimer);
  if(id==='HEAL') player.hp=Math.min(player.maxHp,player.hp+player.maxHp*.4);
  else skills[id]++;
  levelModal.style.display='none';
  gameState='PLAY';
  updateStatusPanel();
}

function triggerGameOver(){
  if(gameState==='GAMEOVER') return;
  gameState='GAMEOVER';
  meta.gold+=goldEarned;
  localStorage.setItem('go_airraid_gold',String(meta.gold));
  if(stage>bestStage){bestStage=stage;localStorage.setItem('go_airraid_best_stage',String(bestStage));}

  totalGoldDisplay.innerText=`${goldEarned} G 획득 / 보유 ${meta.gold} G / 최고 STAGE ${bestStage}`;
  document.getElementById('lvl-atk').innerText=`Lv.${meta.atkLevel}`;
  document.getElementById('lvl-hp').innerText=`Lv.${meta.hpLevel}`;

  let atkCost=Math.floor(500*Math.pow(meta.atkLevel,1.5));
  let hpCost=Math.floor(400*Math.pow(meta.hpLevel,1.4));
  document.getElementById('btn-buy-atk').innerText=`${atkCost} G`;
  document.getElementById('btn-buy-hp').innerText=`${hpCost} G`;
  document.getElementById('btn-buy-atk').disabled=meta.gold<atkCost;
  document.getElementById('btn-buy-hp').disabled=meta.gold<hpCost;

  gameoverScreen.style.display='flex';
  modalSecondsLeft=5;
  gameoverTimerView.innerText=`자동 재출격까지 ${modalSecondsLeft}초`;
  clearInterval(modalTimer);
  modalTimer=setInterval(()=>{
    modalSecondsLeft--;
    gameoverTimerView.innerText=`자동 재출격까지 ${modalSecondsLeft}초`;
    if(modalSecondsLeft<=0){clearInterval(modalTimer);restartGame();}
  },1000);
}

window.buyMeta=function(type){
  if(type==='atk'){
    let cost=Math.floor(500*Math.pow(meta.atkLevel,1.5));
    if(meta.gold>=cost){meta.gold-=cost;meta.atkLevel++;}
  }else{
    let cost=Math.floor(400*Math.pow(meta.hpLevel,1.4));
    if(meta.gold>=cost){meta.gold-=cost;meta.hpLevel++;}
  }
  localStorage.setItem('go_airraid_gold',String(meta.gold));
  triggerGameOver();
}

window.restartGame=function(){
  clearInterval(modalTimer);
  gameoverScreen.style.display='none';
  initRun();
  gameState='PLAY';
}

function damagePlayer(amount){
  if(player.inv>0)return;
  player.hp-=amount;
  player.inv=55;
  explode(player.x,player.y,'#ff9f43',18);
  if(player.hp<=0) triggerGameOver();
  updateStatusPanel();
}

function explode(x,y,color,count=12){
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let sp=Math.random()*4+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*3+2,color,alpha:1});
  }
}

function update(now){
  if(gameState!=='PLAY') return;

  if(now-lastSpawn>spawnInterval){
    spawnEnemyUnit(now);
    lastSpawn=now;
  }

  if(player.inv>0) player.inv--;
  player.x+=(player.targetX-player.x)*0.13;
  player.y+=(player.targetY-player.y)*0.13;
  player.x=Math.max(player.width/2,Math.min(canvas.width-player.width/2,player.x));
  player.y=Math.max(110,Math.min(canvas.height-player.height/2-20,player.y));

  fireWeapons(now);
  shieldAngle+=0.045;

  stars.forEach(s=>{s.y+=s.v;if(s.y>canvas.height){s.y=-5;s.x=Math.random()*canvas.width;}});

  playerBullets.forEach((b,idx)=>{
    if(b.type==='MISSILE'||b.type==='CLUSTER'){
      b.x+=b.vx;b.y+=b.vy;
      if(enemies.length>0 && b.type==='MISSILE'){
        let target=enemies.reduce((a,c)=>Math.hypot(c.x-b.x,c.y-b.y)<Math.hypot(a.x-b.x,a.y-b.y)?c:a,enemies[0]);
        b.vx+=Math.sign(target.x-b.x)*.18;
      }
      if(b.y<-50||b.x<-50||b.x>canvas.width+50) playerBullets.splice(idx,1);
    }else{
      enemies.forEach(e=>{
        if(Math.abs(e.x-b.x)<e.width/2+(b.type==='PRISM_LASER'?28:16) && e.y<player.y){
          e.hp-=b.damage;
          if(Math.random()>.8) explode(e.x,e.y,'#00ffcc',2);
        }
      });
      playerBullets.splice(idx,1);
    }
  });

  enemies.forEach((e,eIdx)=>{
    if(e.pattern==='ARTILLERY'){
      if(e.y<e.stopY) e.y+=e.vy;
      else{ e.x+=e.vx; if(e.x<e.width/2||e.x>canvas.width-e.width/2)e.vx*=-1; }
    }else if(e.pattern==='BOSS'){
      if(e.y<e.stopY) e.y+=e.vy;
      else{ e.x+=Math.sin(now/650)*1.8; }
    }else{
      e.x+=e.vx;e.y+=e.vy;
    }

    if(now-e.lastShot>e.shotInterval){
      if(e.pattern==='ARTILLERY'||e.pattern==='BOSS'){
        let fan=e.pattern==='BOSS'?5:3;
        for(let i=0;i<fan;i++){
          let spread=(i-(fan-1)/2)*.8;
          enemyBullets.push({x:e.x,y:e.y+e.height/2,vx:spread,vy:4.1,r:e.pattern==='BOSS'?7:5});
        }
      }else enemyBullets.push({x:e.x,y:e.y+e.height/2,vx:0,vy:3.8,r:5});
      e.lastShot=now;
    }

    playerBullets.forEach((b,bIdx)=>{
      if(b.type==='MISSILE'||b.type==='CLUSTER'){
        if(Math.hypot(b.x-e.x,b.y-e.y)<e.width/2+8){
          e.hp-=b.damage;
          playerBullets.splice(bIdx,1);
          explode(e.x,e.y,'#ff4757',5);
          if(b.type==='CLUSTER'){
            for(let d=0;d<4;d++){
              let ang=Math.PI/2+(d-1.5)*.45;
              playerBullets.push({x:b.x,y:b.y,type:'MISSILE',damage:b.damage*.4,vx:Math.cos(ang)*5,vy:-Math.sin(ang)*5,r:5});
            }
          }
        }
      }
    });

    if(e.hp<=0){
      let reward=e.type==='BOSS'?600:(e.type==='BOMBER'?80:35);
      goldEarned+=reward;
      player.xp+=e.type==='BOSS'?100:(e.type==='BOMBER'?40:25);
      stageKills+=e.type==='BOSS'?5:1;

      if(skills.SK_C>0 && Math.random()<(.15+skills.SK_C*.08)){
        enemies.filter(o=>o.id!==e.id&&Math.hypot(o.x-e.x,o.y-e.y)<230).slice(0,3).forEach(t=>{
          t.hp-=player.baseAtk*(.8+skills.SK_C*.25);
          chainLightnings.push({x1:e.x,y1:e.y,x2:t.x,y2:t.y,alpha:1,color:'#ff9f43'});
        });
      }

      if(skills.EV_L>0 && Math.random()>.4){
        enemies.filter(o=>o.id!==e.id&&Math.hypot(o.x-e.x,o.y-e.y)<210).forEach(t=>{
          t.hp-=player.baseAtk*1.4;
          chainLightnings.push({x1:e.x,y1:e.y,x2:t.x,y2:t.y,alpha:1,color:'#fff'});
        });
      }

      explode(e.x,e.y,e.type==='BOSS'?'#ffd32a':'#ff4757',e.type==='BOSS'?45:14);
      enemies.splice(eIdx,1);
      updateStatusPanel();
      return;
    }

    if(Math.hypot(e.x-player.x,e.y-player.y)<(player.width/3+e.width/3)){
      enemies.splice(eIdx,1);
      damagePlayer(e.type==='BOSS'?45:25);
    }

    if(e.y>canvas.height+70||e.x<-110||e.x>canvas.width+110){
      enemies.splice(eIdx,1);
      damagePlayer(15);
    }
  });

  enemyBullets.forEach((eb,idx)=>{
    eb.x+=eb.vx||0; eb.y+=eb.vy;
    if(skills.SK_S>0){
      let orbit=68+skills.SK_S*12;
      let sx=player.x+Math.cos(shieldAngle)*orbit;
      let sy=player.y+Math.sin(shieldAngle)*orbit;
      if(Math.hypot(eb.x-sx,eb.y-sy)<(22+skills.SK_S*4)){
        enemyBullets.splice(idx,1); explode(eb.x,eb.y,'#3867d6',4); return;
      }
    }
    if(Math.hypot(eb.x-player.x,eb.y-player.y)<player.width/3){
      enemyBullets.splice(idx,1);
      damagePlayer(10);
    }
    if(eb.y>canvas.height+25||eb.x<-25||eb.x>canvas.width+25) enemyBullets.splice(idx,1);
  });

  chainLightnings.forEach((cl,idx)=>{cl.alpha-=.08;if(cl.alpha<=0)chainLightnings.splice(idx,1);});
  particles.forEach((p,idx)=>{p.x+=p.vx;p.y+=p.vy;p.alpha-=.035;if(p.alpha<=0)particles.splice(idx,1);});

  if(stageKills>=killsRequired){
    stage++; stageKills=0; killsRequired=Math.floor(killsRequired*1.28);
    spawnInterval=Math.max(360,spawnInterval-55);
    updateStatusPanel();
  }

  if(player.xp>=player.nextXp){
    player.xp-=player.nextXp;
    player.nextXp=Math.floor(player.nextXp*1.3);
    triggerLevelUp();
    updateStatusPanel();
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#06101f';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(125,249,255,.7)';
  stars.forEach(s=>ctx.fillRect(s.x,s.y,s.s,s.s*2.4));

  ctx.strokeStyle='rgba(8,17,30,.9)';ctx.lineWidth=1;
  for(let i=0;i<canvas.width;i+=54){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}

  chainLightnings.forEach(cl=>{
    ctx.strokeStyle=cl.color==='white'?`rgba(255,255,255,${cl.alpha})`:`rgba(255,159,67,${cl.alpha})`;
    ctx.lineWidth=cl.color==='#fff'?5:3;
    ctx.beginPath();ctx.moveTo(cl.x1,cl.y1);
    let mx=(cl.x1+cl.x2)/2+(Math.random()-.5)*28;
    let my=(cl.y1+cl.y2)/2+(Math.random()-.5)*28;
    ctx.lineTo(mx,my);ctx.lineTo(cl.x2,cl.y2);ctx.stroke();
  });

  if(gameState==='PLAY' && skills.SK_S>0){
    let orbit=68+skills.SK_S*12;
    let sx=player.x+Math.cos(shieldAngle)*orbit;
    let sy=player.y+Math.sin(shieldAngle)*orbit;
    ctx.beginPath();ctx.arc(sx,sy,20+skills.SK_S*3,0,Math.PI*2);
    ctx.fillStyle='rgba(75,101,235,.42)';ctx.fill();
    ctx.strokeStyle='#3867d6';ctx.lineWidth=3;ctx.stroke();
  }

  playerBullets.forEach(b=>{
    if(b.type==='BASE_LASER'||b.type==='PRISM_LASER'){
      ctx.strokeStyle=b.type==='PRISM_LASER'?'#ffffff':'#00ffcc';
      ctx.lineWidth=b.type==='PRISM_LASER'?26:13;
      ctx.shadowBlur=15;ctx.shadowColor='#00ffcc';
      ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x,0);ctx.stroke();
      ctx.shadowBlur=0;
    }else{
      ctx.fillStyle=b.type==='CLUSTER'?'#ff9f43':'#00ffcc';
      ctx.beginPath();ctx.arc(b.x,b.y,b.r||7,0,Math.PI*2);ctx.fill();
    }
  });

  enemyBullets.forEach(eb=>{ctx.fillStyle='#ff4757';ctx.beginPath();ctx.arc(eb.x,eb.y,eb.r,0,Math.PI*2);ctx.fill();});

  enemies.forEach(e=>{
    ctx.save();ctx.translate(e.x,e.y);
    ctx.fillStyle=e.type==='BOSS'?'#3d123d':(e.type==='BOMBER'?'#2d142c':'#111b29');
    ctx.strokeStyle=e.type==='BOSS'?'#ffd32a':(e.type==='BOMBER'?'#ff4757':'#ff9f43');
    ctx.lineWidth=e.type==='BOSS'?4:3;
    ctx.beginPath();
    if(e.pattern==='ARTILLERY'){ctx.rect(-e.width/2,-e.height/2,e.width,e.height);}
    else{
      ctx.moveTo(0,e.height/2);ctx.lineTo(-e.width/2,-e.height/2);ctx.lineTo(0,-e.height*.25);ctx.lineTo(e.width/2,-e.height/2);
    }
    ctx.closePath();ctx.fill();ctx.stroke();

    if(e.type==='BOSS'){
      ctx.fillStyle='rgba(255,255,255,.9)';
      ctx.fillRect(-e.width/2,-e.height/2-14,e.width*(e.hp/e.maxHp),6);
    }
    ctx.restore();
  });

  particles.forEach(p=>{ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});

  // 기체 5단계 외형 변화
  const visualLevel=Math.max(skills.SK_M,skills.SK_L,skills.EV_M||skills.EV_L?5:1);
  ctx.save();
  ctx.translate(player.x,player.y);
  if(player.inv>0 && Math.floor(performance.now()/80)%2===0) ctx.globalAlpha=.45;
  ctx.fillStyle='#ffffff';
  ctx.strokeStyle=visualLevel>=5?'#ff4757':visualLevel>=3?'#ff9f43':'#00ffcc';
  ctx.lineWidth=4;
  ctx.beginPath();
  if(visualLevel>=5){
    ctx.moveTo(0,-52);ctx.lineTo(-52,22);ctx.lineTo(-66,44);ctx.lineTo(-25,26);ctx.lineTo(0,50);ctx.lineTo(25,26);ctx.lineTo(66,44);ctx.lineTo(52,22);
  }else if(visualLevel>=3){
    ctx.moveTo(0,-46);ctx.lineTo(-48,34);ctx.lineTo(-22,16);ctx.lineTo(0,38);ctx.lineTo(22,16);ctx.lineTo(48,34);
  }else{
    ctx.moveTo(0,-38);ctx.lineTo(-38,26);ctx.lineTo(-16,12);ctx.lineTo(0,30);ctx.lineTo(16,12);ctx.lineTo(38,26);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#07101f';ctx.beginPath();ctx.ellipse(0,-12,8,16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff9f43';ctx.beginPath();ctx.moveTo(-13,24);ctx.lineTo(-7,43);ctx.lineTo(-2,24);ctx.fill();ctx.beginPath();ctx.moveTo(13,24);ctx.lineTo(7,43);ctx.lineTo(2,24);ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
}

function loop(now){
  update(now);
  draw();
  requestAnimationFrame(loop);
}
initRun();
requestAnimationFrame(loop);
</script>
</body>
</html>
